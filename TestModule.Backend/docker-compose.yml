version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recipes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrator:
    build:
      context: .
      dockerfile: Dockerfile.Migrator
    environment:
      DB_CONNECTION_STRING: "Host=db;Port=5432;Database=recipes;Username=postgres;Password=postgres"
    depends_on:
      - db
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile.AppHost
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=recipes;Username=postgres;Password=postgres"
    ports:
      - "8080:8080"
    depends_on:
      - migrator

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
