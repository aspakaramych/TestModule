version: '3.8'

services:
  db-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: recipes_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recipes_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator-test:
    build: 
      context: .
      dockerfile: Dockerfile.Migrator
    environment:
      DB_CONNECTION_STRING: "Host=db-test;Port=5432;Database=recipes_test;Username=postgres;Password=test_password"
    depends_on:
      db-test:
        condition: service_healthy
    restart: "no"
  app-test:
    build:
      context: .
      dockerfile: Dockerfile.AppHost
    environment:
      ConnectionStrings__DefaultConnection: "Host=db-test;Port=5432;Database=recipes_test;Username=postgres;Password=test_password"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5001:8080"
    depends_on:
      db-test:
        condition: service_healthy
      migrator-test:
        condition: service_completed_successfully
